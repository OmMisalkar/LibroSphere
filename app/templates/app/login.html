<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
    }

    .container {
      width: 350px;
      padding: 30px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 14px;
      margin-bottom: 5px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: none;
      border-radius: 6px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      outline: none;
    }

    input::placeholder {
      color: #ccc;
    }

    input:focus {
      border: 1px solid #38bdf8;
    }

    input[type="submit"] {
      background: #38bdf8;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    input[type="submit"]:hover {
      background: #0ea5e9;
    }

    .link {
      text-align: center;
      margin-top: 10px;
    }

    .link a {
      color: #38bdf8;
      text-decoration: none;
    }

    .link a:hover {
      text-decoration: underline;
    }

    .error {
      color: #f87171;
      text-align: center;
      margin-bottom: 10px;
    }

  </style>
</head>

<body>

  <div class="container">
    <h2>📚 LibroSphare</h2>
    <h2>Login</h2>

    <!-- Error Message -->
    {% if messages %}
      {% for message in messages %}
        <div class="error">{{ message }}</div>
      {% endfor %}
    {% endif %}

    <form action="{% url 'login' %}" method="post">
      {% csrf_token %}

      <label>Username</label>
      <input type="text" name="username" placeholder="Enter username" required>

      <label>Password</label>
      <input type="password" name="password" placeholder="Enter password" required>

      <input type="submit" value="Login">
    </form>

    <div class="link">
      <p>Don't have an account?</p>
      <a href="{% url 'register' %}">Register here</a>
    </div>
  </div>

</body>
</html>
